<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — GRACE</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- 헤더 -->
  <header>
    <div class="header-inner">
      <div class="logo"><a href="index.html">GRACE</a></div>
      <nav>
        <a href="index.html">홈</a>
        <a href="#">신상품</a>
        <a href="#">베스트</a>
        <a href="#">세일</a>
      </nav>
      <div class="header-right">
        <div class="auth-buttons" id="auth-buttons">
          <a href="login.html" class="btn-login active">로그인</a>
          <a href="signup.html" class="btn-signup">회원가입</a>
        </div>
        <div class="user-info" id="user-info" style="display:none;">
          <span class="user-name" id="user-name"></span>
          <button class="btn-logout" onclick="logout()">로그아웃</button>
        </div>
        <a href="cart.html" class="cart-icon">
          <i class="fa-solid fa-bag-shopping"></i>
          <span class="cart-count" id="cart-count">0</span>
        </a>
      </div>
    </div>
  </header>

  <!-- 로그인 폼 -->
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h2>로그인</h2>
        <p>GRACE에 오신 것을 환영합니다</p>
      </div>

      <form class="auth-form" id="login-form">
        <div class="form-group">
          <label for="email">이메일</label>
          <div class="input-wrap">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" placeholder="이메일을 입력하세요" required>
          </div>
        </div>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
          </div>
        </div>

        <p class="error-msg" id="error-msg"></p>

        <button type="submit" class="btn-main btn-full btn-auth">로그인</button>
      </form>

      <div class="auth-footer">
        <p>아직 계정이 없으신가요? <a href="signup.html">회원가입</a></p>
      </div>
    </div>
  </main>

  <!-- 푸터 -->
  <footer>
    <p>© 2026 GRACE. All rights reserved.</p>
  </footer>

  <script src="app.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');

      const users = JSON.parse(localStorage.getItem('grace_users') || '[]');
      const user = users.find(u => u.email === email && u.password === password);

      if (!user) {
        errorMsg.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
        return;
      }

      localStorage.setItem('grace_logged_in', JSON.stringify({ name: user.name, email: user.email }));
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
